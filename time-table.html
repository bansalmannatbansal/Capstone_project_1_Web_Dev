<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RishiLearn - Time Table</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/time-table.css">
</head>
<body>
    <header class="navbar" id="navbar">
        <div class="nav-inner">
            <a href="#" class="brand" id="brand-logo">
                <div class="brand-orb">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <circle cx="14" cy="14" r="12" stroke="url(#orbGrad)" stroke-width="2"/>
                        <path d="M9 10 L14 7 L19 10 L19 18 L14 21 L9 18 Z" fill="url(#orbFill)" opacity="0.9"/>
                        <circle cx="14" cy="14" r="3" fill="#fff" opacity="0.8" />
                        <defs>
                            <linearGradient id="orbGrad" x1="0" y1="0" x2="28" y2="28">
                                <stop offset="0%" stop-color="#8b5cf6" />
                                <stop offset="100%" stop-color="#ec4899" />
                            </linearGradient>
                            <linearGradient id="orbFill" x1="0" y1="0" x2="28" y2="28">
                                <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8" />
                                <stop offset="100%" stop-color="#ec4899" stop-opacity="0.6" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="brand-text">RishiLearn</span>
            </a>

            <!-- Sidebar-style Nav Links -->
            <nav class="nav-links" id="nav-links" aria-label="Main navigation">
                <a href="./dashboard.html" class="nav-item" id="nav-dashboard">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Dashboard
                </a>
                <a href="./courses.html" class="nav-item" id="nav-courses">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                    </svg>
                    Courses
                </a>
                
                <a href="./time-table.html" class="nav-item active" id="nav-timetable">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                    </svg>
                    Time Table
                </a>
            </nav>

            <!-- Nav Actions -->
            <div class="nav-actions">
                <button class="nav-search-btn" id="nav-search-btn" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </button>
                <button class="btn-notify" id="btn-notify" aria-label="Notifications">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                </button>
                <div class="avatar-wrap" id="user-avatar">
                    <div class="avatar">R</div>
                    <span class="avatar-status"></span>
                </div>
                <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>
</body>
</html>
