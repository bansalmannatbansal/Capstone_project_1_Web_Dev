<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Login — RishiLearn LMS</title>
      <meta name="description" content="Secure login to your RishiLearn dashboard, timetable, and leaderboard." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="CSS/style.css" />
      <link rel="stylesheet" href="CSS/login.css" />
      <!-- Supabase JS Library -->
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

      <div class="scene" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
      </div>

  <!-- ── PAGE ──────────────────────────────────────────────────── -->
      <main class="page" role="main">
            <div class="card">

                  <section class="left-panel" aria-label="RishiLearn branding">

                        <a href="#" class="logo" aria-label="RishiLearn home">
                          <div class="logo-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                              <path d="M12 2C8.5 2 5.5 4 4 7L2 12l4-1 1 4 5-2c0 0 5 1 7-4s0-7-7-7zm0 4a2 2 0 1 1 0 4 2 2 0 0 1 0-4zM6 18l-2 4 4-2z"/>
                            </svg>
                          </div>
                          <span class="logo-wordmark">Rishi<span>Learn</span></span>
                        </a>

                        <div class="left-hero">
                          <h1>Level Up Your<br /><em>Learning Journey.</em></h1>
                          <p>Secure access to your Dashboard, Timetable, and Leaderboard — all in one cosmic hub.</p>
                        </div>

                        <!-- 3-D Low-Poly Crystal Illustration (pure SVG) -->
                        <div class="illustration-wrap" aria-hidden="true">
                              <svg class="crystal-svg" viewBox="0 0 240 260" fill="none" xmlns="http://www.w3.org/2000/svg">
                                  <!-- top apex to upper ring -->
                                  <polygon points="120,10  72,80  120,68"  fill="#7c3aed" opacity="0.95"/>
                                  <polygon points="120,10  120,68 168,80"  fill="#a855f7" opacity="0.90"/>
                                  <polygon points="120,10  168,80 174,55"  fill="#c084fc" opacity="0.75"/>
                                  <polygon points="120,10  66,55  72,80"   fill="#6d28d9" opacity="0.85"/>
                                  <!-- upper mid band -->
                                  <polygon points="72,80  48,130 100,115"  fill="#ec4899" opacity="0.90"/>
                                  <polygon points="72,80  100,115 120,68"  fill="#db2777" opacity="0.80"/>
                                  <polygon points="120,68 100,115 140,115" fill="#9d174d" opacity="0.60"/>
                                  <polygon points="120,68 140,115 168,80"  fill="#7c3aed" opacity="0.75"/>
                                  <polygon points="168,80 140,115 192,130" fill="#8b5cf6" opacity="0.85"/>
                                  <polygon points="168,80 192,130 174,55"  fill="#a78bfa" opacity="0.70"/>
                                  <!-- lower mid band -->
                                  <polygon points="48,130  60,190 100,115"  fill="#06b6d4" opacity="0.85"/>
                                  <polygon points="100,115  60,190 120,175" fill="#0891b2" opacity="0.75"/>
                                  <polygon points="100,115 120,175 140,115" fill="#ec4899" opacity="0.70"/>
                                  <polygon points="140,115 120,175 180,190" fill="#7c3aed" opacity="0.80"/>
                                  <polygon points="140,115 180,190 192,130" fill="#c084fc" opacity="0.85"/>
                                 <!-- lower ring to bottom apex -->
                                  <polygon points="60,190  120,250 120,175"  fill="#4f46e5" opacity="0.90"/>
                                  <polygon points="120,175 120,250 180,190"  fill="#7c3aed" opacity="0.85"/>
                                  <polygon points="48,130  60,190  40,160"   fill="#06b6d4" opacity="0.55"/>
                                  <polygon points="192,130 200,160 180,190"  fill="#a855f7" opacity="0.55"/>
                                  <!-- bright edge highlights -->
                                  <line x1="120" y1="10"  x2="72"  y2="80"  stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
                                  <line x1="120" y1="10"  x2="168" y2="80"  stroke="rgba(255,255,255,0.20)" stroke-width="0.8"/>
                                  <line x1="72"  y1="80"  x2="168" y2="80"  stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
                                  <line x1="48"  y1="130" x2="192" y2="130" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
                                  <line x1="60"  y1="190" x2="180" y2="190" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
                                  <line x1="120" y1="10"  x2="120" y2="250" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>
                              </svg>
                        </div>

                        <div class="tagline" aria-label="tagline">
                          Unlock potential.<br />
                          <span style="padding-left:0.5em; color: rgba(6,182,212,0.55);">&nbsp;Connect with your future.</span>
                        </div>
                  </section>

              <!-- ════ RIGHT PANEL ════════════════════════════════════════ -->
                  <section class="right-panel" aria-label="Login form">

                      <div class="form-header">
                        <h2 id="login-title">Student Login</h2>
                        <p>Enter your credentials to continue.</p>
                      </div>

                      <!-- ROLE SELECTOR -->
                      <div class="role-selector" aria-label="Select Role" role="group">
                        <button type="button" class="role-btn active" data-role="student">Student</button>
                        <button type="button" class="role-btn" data-role="teacher">Teacher</button>
                        <button type="button" class="role-btn" data-role="admin">Admin</button>
                      </div>

                      <form class="login-form" id="login-form" method="post" action="#" autocomplete="off" novalidate>

                          <div class="field">
                                <div class="field-label-row">
                                  <label class="field-label" for="email-input">Email Address</label>
                                  <!-- <span class="field-comment">// user_id: encrypted_string</span> -->
                                </div>
                                <div class="input-wrap">
                                    <span class="input-icon" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                        </svg>
                                    </span>
                                    <input
                                      type="email"
                                      id="email-input"
                                      name="email"
                                      autocomplete="off"
                                      aria-label="Email address"
                                      required
                                    />
                                </div>
                          </div>

                          <!-- PASSWORD -->
                          <div class="field">
                                <div class="field-label-row">
                                    <label class="field-label" for="password-input">Password</label>
                                    <!-- <span class="field-comment">// auth_token: encrypted_string</span> -->
                                </div>
                                <div class="input-wrap">
                                  <input
                                    type="password"
                                    id="password-input"
                                    name="password"
                                    class="no-icon"
                                    autocomplete="off"
                                    aria-label="Password"
                                    required
                                  />
                                    <!-- Toggle show/hide password — icon injected by JS -->
                                  <button class="pw-toggle" type="button" id="pw-toggle-btn" aria-label="Show password"></button>
                                </div>
                          </div>

                          <!-- REMEMBER / FORGOT -->
                          <div class="remember-row">
                              <label class="remember-label" for="remember-checkbox">
                                  <input type="checkbox" id="remember-checkbox" name="remember" />
                                <span class="remember-text">Remember Me</span>
                              </label>
                              <a href="#" class="forgot-link" id="link-forgot">Forgot Password?</a>
                          </div>

                          <!-- LOGIN BUTTON -->
                          <button class="btn-login" type="submit" id="btn-login">
                            Login &nbsp;→
                          </button>


                      </form>
                  </section>

            </div>
      </main>

  <script src="JS/login.js"></script>



</body>
</html>
