<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmyshow</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
   <header class="navbar" id="top-navbar">
    <div class="navbar__inner">
      <a href="#" class="navbar__logo" id="bms-logo" aria-label="BookMyShow home">
        book<span class="logo-my">my</span>show
      </a>
      <div class="navbar__search" id="search-bar">
        <span class="search-icon" aria-hidden="true">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          type="search"
          id="main-search-input"
          class="search-input"
          placeholder="Search for Movies, Events, Plays, Sports and Activities"
          aria-label="Search for Movies, Events, Plays, Sports and Activities"
        />
      </div>
      <div class="navbar__controls" id="navbar-controls">
        <button class="city-selector" id="city-selector-btn" aria-label="Select city: Delhi-NCR">
          Delhi-NCR
          <span class="city-arrow" aria-hidden="true">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
        </button>
        <button class="signin-btn" id="signin-btn" aria-label="Sign in to your account">Sign in</button>
        <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
          <span class="ham-line"></span>
          <span class="ham-line"></span>
          <span class="ham-line"></span>
        </button>
      </div>
    </div>
  </header>
</body>
</html>
